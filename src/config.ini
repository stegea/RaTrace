[scenes]
scene_file = scene_06_COOKE_TRIPLES_multiple_parallel_beams_and_lenses.py
scenes_folder = ..\scenes
load_scene_at_startup = 1
start_simulation_after_loading_scene = 1
reset_axis_after_loading_scene = 1

[simulation]
nr_of_rays = 100
use_phase_information = 0
items_are_ordered = 0
export_folder = ../
add_timestamp_to_export_file = 1
exit_after_run = 1
generate_reflected_rays = 0
max_number_of_reflections = 1

[view]
show_axis_and_grid = 1
black_background = 0
nr_of_rays_to_plot = 10
show_elements_properties = 0
intensity_coded_colors = 1
show_pixels = 0
intensity_scaler = 0.5
show_noncolliding_rays = 0
splash_screen_transition = 0
plot_elements_in_bw = 1

